name: data-cleaning-openenv
version: 0.1.0
description: >
  OpenEnv environment where an agent cleans messy tabular datasets using a
  sandboxed Python REPL. Three tasks of increasing difficulty: e-commerce
  orders (easy), patient records deduplication (medium), and financial
  transaction auditing with 10 named business rules (hard). Dense partial
  rewards are returned after every exec step.

tags:
  - data-engineering
  - tabular
  - repl
  - partial-reward
  - openenv

tasks:
  - id: ecommerce_easy
    difficulty: easy
    rows: 500
    cols: 8
    baseline_score_gpt4o: 0.78
  - id: patient_records_medium
    difficulty: medium
    rows: 1200
    cols: 9
    baseline_score_gpt4o: 0.55
  - id: financial_audit_hard
    difficulty: hard
    rows: 5000
    cols: 12
    baseline_score_gpt4o: 0.30

action_space:
  type: dataclass
  class: DataCleaningAction
  fields:
    type:
      type: string
      enum: [exec, submit]
    code:
      type: string
      description: Python snippet up to 50 lines. df is in scope. Required when type=exec.
    task_id:
      type: string
      description: Task to run. Used only in reset().
      enum: [ecommerce_easy, patient_records_medium, financial_audit_hard]
    seed:
      type: integer
      description: RNG seed for reproducibility. Used only in reset().

observation_space:
  type: dataclass
  class: DataCleaningObservation
  fields:
    df_preview:
      type: string
      description: First 10 rows as markdown table
    df_info:
      type: string
      description: dtypes and null counts
    df_stats:
      type: string
      description: df.describe() output
    task_spec:
      type: string
      description: Plain-English objective and constraints
    exec_result:
      type: string
      description: stdout and stderr from last code execution
    step_count:
      type: integer
      minimum: 0
    partial_score:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Dense reward signal updated after every exec step
    done:
      type: boolean
    error:
      type: string
      description: Exception message if last exec raised
    reward:
      type: number
      minimum: 0.0
      maximum: 1.0
      description: Final reward when done=True

reward_space:
  components:
    column_quality:    { weight: 0.50, description: Per-column dtype/null/value correctness }
    schema_compliance: { weight: 0.20, description: Output columns match expected schema }
    row_preservation:  { weight: 0.15, description: Penalise unnecessary row drops }
    efficiency:        { weight: 0.10, description: Bonus <=10 steps, penalty >15 steps }
    no_crash_bonus:    { weight: 0.05, description: No unhandled exceptions in episode }

episode:
  max_steps: 20
  termination: submit action OR max_steps exceeded
  seed: integer controlling dataset corruption pattern

sandbox:
  language: python3.11
  pre_injected: [pd, np, re, math, datetime, difflib, unicodedata, collections, itertools, string]
  allowed_imports: [pandas, numpy, re, datetime, difflib, unicodedata, collections, itertools, math, string]
  blocked: [open, file I/O, network, subprocess, compile, breakpoint]
  max_lines_per_step: 50

framework:
  package: openenv-core
  version: ">=0.2.1"
  transport: websocket
  base_class: openenv.core.env_server.Environment
  client_class: openenv.core.env_client.EnvClient